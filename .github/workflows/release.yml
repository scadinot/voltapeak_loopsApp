name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

permissions:
  contents: write

jobs:
  release:
    name: Build, package and publish release
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect scheme
        run: |
          default=$(xcodebuild -list -project voltapeak_loops.xcodeproj -json | ruby -e "require 'json'; puts JSON.parse(STDIN.read)['project']['schemes'][0]")
          if [ -z "$default" ]; then
            echo "::error::No Xcode scheme detected. Share a scheme via Xcode -> Manage Schemes (Shared checkbox) and commit voltapeak_loops.xcodeproj/xcshareddata/xcschemes/."
            exit 1
          fi
          {
            echo "scheme<<EOF"
            echo "$default"
            echo "EOF"
          } >> "$GITHUB_ENV"
          echo "Using scheme: $default"

      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project voltapeak_loops.xcodeproj \
            -scheme "$scheme" \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath build/voltapeak_loops.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual | xcpretty

      - name: Package .app into zip
        run: |
          TAG="${GITHUB_REF_NAME}"
          cd build/voltapeak_loops.xcarchive/Products/Applications
          ditto -c -k --keepParent voltapeak_loops.app "$GITHUB_WORKSPACE/voltapeak_loops-${TAG}.zip"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "ASSET=voltapeak_loops-${TAG}.zip" >> "$GITHUB_ENV"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — uploading asset (with --clobber)."
            gh release upload "$TAG" "$ASSET" --clobber --repo "$GITHUB_REPOSITORY"
          else
            echo "Creating release $TAG."
            gh release create "$TAG" \
              --title "voltapeak_loops $TAG" \
              --generate-notes \
              --repo "$GITHUB_REPOSITORY" \
              "$ASSET"
          fi
